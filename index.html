<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POPCAT ACHI EDITION</title>
    <style>
        body { 
            margin: 0; background-color: black; color: white; font-family: 'Arial', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden; user-select: none; transition: background 0.2s;
            -webkit-touch-callout: none;
        }
        #score { 
            font-size: clamp(60px, 20vw, 120px); font-weight: bold; 
            margin-bottom: 10px; z-index: 10; text-shadow: 4px 4px 0px #000;
        }
        #cat-container { 
            position: relative; width: 100%; max-width: 600px; 
            display: flex; justify-content: center; align-items: center;
        }
        img { 
            width: 100%; height: auto; display: none; 
            -webkit-tap-highlight-color: transparent;
        }
        img.active { display: block; }
        
        /* Effect ตาแดงตอนกดเร็วเกิน */
        .red-eye { filter: sepia(100%) saturate(1000%) hue-rotate(-50deg); }
        
        #warning { 
            color: #ff0000; font-size: 28px; font-weight: bold; display: none; 
            position: absolute; top: 50%; width: 100%; text-align: center;
            background: rgba(0,0,0,0.7); padding: 10px 0; z-index: 15;
        }
        #timer { 
            color: #ff0000; font-size: 50px; font-weight: bold; display: none; 
            z-index: 20; position: absolute; bottom: 10%; text-shadow: 2px 2px 10px #000;
        }
    </style>
</head>
<body id="body">

    <div id="score">0</div>
    
    <div id="cat-container">
        <h1 id="warning">TOO FAST! CALM DOWN</h1>
        <h1 id="timer">FREE IN: 9s</h1>
        
        <img id="cat-close" src="popcat_close.png" class="active">
        <img id="cat-open" src="popcat_open.png">
        <img id="rick" src="ge.gif">
    </div>

    <audio id="snd-pop" src="pop.mp3" preload="auto"></audio>
    <audio id="snd-rick" src="rick.mp3" preload="auto"></audio>

    <script>
        // --- ระบบบันทึกคะแนน ---
        let score = parseInt(localStorage.getItem('popcat_score')) || 0;
        let rickTimer = null;
        let clickHistory = [];
        const MAX_CPS = 25; // เพิ่มความเร็วให้แล้ว กดรัวได้สะใจขึ้น
        let isRedEye = false;

        const scoreEl = document.getElementById('score');
        const catClose = document.getElementById('cat-close');
        const catOpen = document.getElementById('cat-open');
        const rickImg = document.getElementById('rick');
        const body = document.getElementById('body');
        const warn = document.getElementById('warning');
        const timerEl = document.getElementById('timer');
        const sndPop = document.getElementById('snd-pop');
        const sndRick = document.getElementById('snd-rick');

        scoreEl.innerText = score;

        function handlePop(e) {
            if (e) e.preventDefault();
            const now = Date.now();
            
            // --- ระบบเช็คความเร็ว (Anti-Cheat) ---
            clickHistory = clickHistory.filter(t => now - t < 1000);
            if (clickHistory.length > MAX_CPS) {
                isRedEye = true;
                body.style.background = "#440000";
                warn.style.display = "block";
                catClose.classList.add('red-eye');
                catOpen.classList.add('red-eye');
                return;
            }
            
            if (rickTimer || isRedEye) return;

            // --- ขั้นตอนการ Pop ---
            clickHistory.push(now);
            score++;
            scoreEl.innerText = score;
            localStorage.setItem('popcat_score', score);
            
            catClose.classList.remove('active');
            catOpen.classList.add('active');
            
            // เล่นเสียง Pop
            sndPop.currentTime = 0;
            sndPop.play().catch(() => {});

            // --- เช็คพิกัด Rickroll ---
            if (score === 200) {
                startRickroll();
            }
        }

        function handleRelease() {
            if (rickTimer) return;
            catOpen.classList.remove('active');
            catClose.classList.add('active');
            
            // ปลดล็อคตาแดง (ถ้าหยุดกด 0.5 วิ)
            setTimeout(() => {
                isRedEye = false;
                body.style.background = "black";
                warn.style.display = "none";
                catClose.classList.remove('red-eye');
                catOpen.classList.remove('red-eye');
            }, 500);
        }

        function startRickroll() {
            rickTimer = 9;
            catClose.style.display = "none";
            catOpen.style.display = "none";
            rickImg.style.display = "block";
            timerEl.style.display = "block";
            
            sndRick.currentTime = 0;
            sndRick.play().catch(() => {
                console.log("กรุณากดที่หน้าจอก่อนเพื่อให้เสียงเล่น");
            });

            let interval = setInterval(() => {
                rickTimer--;
                timerEl.innerText = `FREE IN: ${rickTimer}s`;
                if (rickTimer <= 0) {
                    clearInterval(interval);
                    rickTimer = null;
                    // ข้ามแต้ม 200 ไปเป็น 201 ทันที
                    score = 201;
                    scoreEl.innerText = score;
                    localStorage.setItem('popcat_score', score);
                    
                    rickImg.style.display = "none";
                    catClose.style.display = "block";
                    timerEl.style.display = "none";
                    sndRick.pause();
                }
            }, 1000);
        }

        // รองรับทั้งนิ้วจิ้มและเม้าส์
        window.addEventListener('mousedown', handlePop);
        window.addEventListener('mouseup', handleRelease);
        window.addEventListener('touchstart', handlePop, {passive: false});
        window.addEventListener('touchend', handleRelease, {passive: false});

    </script>
</body>
</html>
