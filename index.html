<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POPCAT ACHI HACK EDITION</title>
    <style>
        body { 
            margin: 0; background-color: black; color: white; font-family: 'Arial', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden; user-select: none; transition: background 0.2s;
            -webkit-touch-callout: none;
        }
        #score { 
            font-size: clamp(60px, 20vw, 120px); font-weight: bold; 
            margin-bottom: 10px; z-index: 10; text-shadow: 4px 4px 0px #000;
        }
        #cat-container { 
            position: relative; width: 100%; max-width: 600px; 
            display: flex; justify-content: center; align-items: center;
        }
        img { width: 100%; height: auto; display: none; -webkit-tap-highlight-color: transparent; }
        img.active { display: block; }
        .red-eye { filter: sepia(100%) saturate(1000%) hue-rotate(-50deg); }
        
        /* --- Hack Menu Style --- */
        #hack-menu {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.95); border: 2px solid #00ff00; padding: 20px;
            border-radius: 15px; z-index: 100; min-width: 250px; text-align: center;
            box-shadow: 0 0 20px #00ff00;
        }
        #hack-menu h2 { color: #00ff00; margin-top: 0; }
        .hack-btn {
            background: #111; color: #00ff00; border: 1px solid #00ff00;
            padding: 10px; margin: 5px; width: 100%; cursor: pointer; border-radius: 5px;
            font-weight: bold; font-size: 16px;
        }
        .hack-btn:active { background: #00ff00; color: #000; }
        .close-hack { color: #ff0000; font-size: 12px; margin-top: 10px; cursor: pointer; }

        #warning { color: #ff0000; font-size: 28px; font-weight: bold; display: none; position: absolute; top: 50%; width: 100%; text-align: center; background: rgba(0,0,0,0.7); padding: 10px 0; z-index: 15; }
        #timer { color: #ff0000; font-size: 50px; font-weight: bold; display: none; z-index: 20; position: absolute; bottom: 10%; text-shadow: 2px 2px 10px #000; }
    </style>
</head>
<body id="body">

    <div id="score">0</div>
    
    <div id="cat-container">
        <h1 id="warning">TOO FAST! CALM DOWN</h1>
        <h1 id="timer">FREE IN: 9s</h1>
        <img id="cat-close" src="popcat_close.png" class="active">
        <img id="cat-open" src="popcat_open.png">
        <img id="rick" src="ge.gif">
    </div>

    <div id="hack-menu">
        <h2>ADMIN HACK</h2>
        <button class="hack-btn" onclick="addScore(100)">+100 POINTS</button>
        <button class="hack-btn" id="auto-btn" onclick="toggleAuto()">AUTO CLICK: OFF</button>
        <button class="hack-btn" onclick="resetScore()">RESET ALL SCORE</button>
        <div class="close-hack" onclick="closeMenu()">[ CLOSE MENU ]</div>
    </div>

    <audio id="snd-pop" src="pop.mp3" preload="auto"></audio>
    <audio id="snd-rick" src="rick.mp3" preload="auto"></audio>

    <script>
        let score = parseInt(localStorage.getItem('popcat_score')) || 0;
        let rickTimer = null;
        let clickHistory = [];
        const MAX_CPS = 30; // กันตาแดงยากขึ้นหน่อย
        let isRedEye = false;
        let isAuto = false;
        let autoInterval = null;

        const scoreEl = document.getElementById('score');
        const catClose = document.getElementById('cat-close');
        const catOpen = document.getElementById('cat-open');
        const rickImg = document.getElementById('rick');
        const body = document.getElementById('body');
        const warn = document.getElementById('warning');
        const timerEl = document.getElementById('timer');
        const sndPop = document.getElementById('snd-pop');
        const sndRick = document.getElementById('snd-rick');
        const hackMenu = document.getElementById('hack-menu');

        scoreEl.innerText = score;

        // --- ระบบ Hack Functions ---
        function addScore(n) {
            score += n;
            saveAndUI();
            if(score >= 200 && score < 210) startRickroll();
        }

        function toggleAuto() {
            isAuto = !isAuto;
            const btn = document.getElementById('auto-btn');
            if(isAuto) {
                btn.innerText = "AUTO CLICK: ON";
                autoInterval = setInterval(() => {
                    handlePop();
                    setTimeout(handleRelease, 50);
                }, 100);
            } else {
                btn.innerText = "AUTO CLICK: OFF";
                clearInterval(autoInterval);
            }
        }

        function resetScore() {
            if(confirm("ล้างแต้มทั้งหมดจริงดิ?")) {
                score = 0;
                saveAndUI();
                closeMenu();
            }
        }

        function closeMenu() { hackMenu.style.display = 'none'; }
        function saveAndUI() {
            scoreEl.innerText = score;
            localStorage.setItem('popcat_score', score);
        }

        // --- ระบบ Pop ปกติ ---
        function handlePop(e) {
            if (e) {
                e.preventDefault();
                // เช็ค 6 นิ้วเพื่อเปิดเมนู Hack
                if (e.touches && e.touches.length >= 6) {
                    hackMenu.style.display = 'block';
                    return;
                }
            }

            const now = Date.now();
            clickHistory = clickHistory.filter(t => now - t < 1000);
            
            if (clickHistory.length > MAX_CPS && !isAuto) {
                isRedEye = true;
                body.style.background = "#440000";
                warn.style.display = "block";
                catClose.classList.add('red-eye');
                catOpen.classList.add('red-eye');
                return;
            }
            
            if (rickTimer || isRedEye) return;

            clickHistory.push(now);
            score++;
            saveAndUI();
            
            catClose.classList.remove('active');
            catOpen.classList.add('active');
            sndPop.currentTime = 0;
            sndPop.play().catch(() => {});

            if (score === 200) startRickroll();
        }

        function handleRelease() {
            if (rickTimer) return;
            catOpen.classList.remove('active');
            catClose.classList.add('active');
            setTimeout(() => {
                isRedEye = false;
                body.style.background = "black";
                warn.style.display = "none";
                catClose.classList.remove('red-eye');
                catOpen.classList.remove('red-eye');
            }, 500);
        }

        function startRickroll() {
            if(isAuto) toggleAuto(); // ปิดออโต้ตอนโดนริค
            rickTimer = 9;
            catClose.style.display = "none";
            catOpen.style.display = "none";
            rickImg.style.display = "block";
            timerEl.style.display = "block";
            sndRick.currentTime = 0;
            sndRick.play().catch(() => {});

            let interval = setInterval(() => {
                rickTimer--;
                timerEl.innerText = `FREE IN: ${rickTimer}s`;
                if (rickTimer <= 0) {
                    clearInterval(interval);
                    rickTimer = null;
                    score = 201;
                    saveAndUI();
                    rickImg.style.display = "none";
                    catClose.style.display = "block";
                    timerEl.style.display = "none";
                    sndRick.pause();
                }
            }, 1000);
        }

        window.addEventListener('mousedown', handlePop);
        window.addEventListener('mouseup', handleRelease);
        window.addEventListener('touchstart', handlePop, {passive: false});
        window.addEventListener('touchend', handleRelease, {passive: false});
    </script>
</body>
</html>
