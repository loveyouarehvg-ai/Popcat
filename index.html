<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POPCAT ACHI HACK V2</title>
    <style>
        body { margin: 0; background-color: black; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; user-select: none; }
        #score { font-size: 100px; font-weight: bold; margin-bottom: 10px; z-index: 10; cursor: pointer; transition: color 0.3s; }
        #cat-container { position: relative; width: 100%; max-width: 600px; display: flex; justify-content: center; align-items: center; }
        img { width: 100%; height: auto; display: none; -webkit-tap-highlight-color: transparent; }
        img.active { display: block; }
        .red-eye { filter: sepia(100%) saturate(1000%) hue-rotate(-50deg); }
        
        /* Hack Menu */
        #hack-menu { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(20, 20, 20, 0.95); border: 2px solid #00ff00; padding: 20px; border-radius: 15px; z-index: 100; min-width: 250px; text-align: center; box-shadow: 0 0 20px #00ff00; }
        .hack-btn { background: #111; color: #00ff00; border: 1px solid #00ff00; padding: 12px; margin: 8px 0; width: 100%; cursor: pointer; border-radius: 5px; font-weight: bold; }
        
        #warning { color: #ff0000; font-size: 28px; font-weight: bold; display: none; position: absolute; top: 50%; width: 100%; text-align: center; z-index: 15; }
        #timer { color: #ff0000; font-size: 50px; font-weight: bold; display: none; z-index: 20; position: absolute; bottom: 10%; }
    </style>
</head>
<body id="body">

    <div id="score" oncontextmenu="return false;">0</div>
    
    <div id="cat-container">
        <h1 id="warning">TOO FAST!</h1>
        <h1 id="timer">FREE IN: 9s</h1>
        <img id="cat-close" src="popcat_close.png" class="active">
        <img id="cat-open" src="popcat_open.png">
        <img id="rick" src="ge.gif">
    </div>

    <div id="hack-menu">
        <h2 style="color:#00ff00">ACHI ADMIN</h2>
        <button class="hack-btn" onclick="addScore(100)">+100 แต้ม</button>
        <button class="hack-btn" id="auto-btn" onclick="toggleAuto()">AUTO CLICK: OFF</button>
        <button class="hack-btn" onclick="resetScore()">RESET SCORE</button>
        <div style="color:red; margin-top:10px; cursor:pointer" onclick="closeMenu()">[ ปิดเมนู ]</div>
    </div>

    <audio id="snd-pop" src="pop.mp3"></audio>
    <audio id="snd-rick" src="rick.mp3"></audio>

    <script>
        let score = parseInt(localStorage.getItem('popcat_score')) || 0;
        let isAuto = false;
        let autoInterval = null;
        let longPressTimer;

        const scoreEl = document.getElementById('score');
        const hackMenu = document.getElementById('hack-menu');
        const sndPop = document.getElementById('snd-pop');

        scoreEl.innerText = score;

        // --- ระบบเปิด Hack ด้วยการกดค้างที่ตัวเลขคะแนน 2 วินาที ---
        scoreEl.addEventListener('touchstart', (e) => {
            longPressTimer = setTimeout(() => {
                hackMenu.style.display = 'block';
                if(window.navigator.vibrate) window.navigator.vibrate(100);
            }, 2000); 
        });
        scoreEl.addEventListener('touchend', () => clearTimeout(longPressTimer));

        function addScore(n) {
            score += n;
            save();
            if(score >= 200 && score < 210) location.reload(); // ให้ Rickroll ทำงาน
        }

        function toggleAuto() {
            isAuto = !isAuto;
            document.getElementById('auto-btn').innerText = isAuto ? "AUTO CLICK: ON" : "AUTO CLICK: OFF";
            if(isAuto) {
                autoInterval = setInterval(() => {
                    score++;
                    save();
                    document.getElementById('cat-close').classList.remove('active');
                    document.getElementById('cat-open').classList.add('active');
                    setTimeout(() => {
                        document.getElementById('cat-open').classList.remove('active');
                        document.getElementById('cat-close').classList.add('active');
                    }, 50);
                }, 100);
            } else {
                clearInterval(autoInterval);
            }
        }

        function resetScore() { score = 0; save(); closeMenu(); }
        function closeMenu() { hackMenu.style.display = 'none'; }
        function save() {
            scoreEl.innerText = score;
            localStorage.setItem('popcat_score', score);
        }

        // ระบบจิ้มแมวปกติ
        function handlePop(e) {
            if(e && e.target.id === "score") return; // ไม่ให้นับคะแนนซ้ำตอนกดค้างเปิดเมนู
            score++;
            save();
            document.getElementById('cat-close').classList.remove('active');
            document.getElementById('cat-open').classList.add('active');
            sndPop.currentTime = 0;
            sndPop.play().catch(()=>{});
        }

        function handleRelease() {
            document.getElementById('cat-open').classList.remove('active');
            document.getElementById('cat-close').classList.add('active');
        }

        window.addEventListener('touchstart', (e) => { if(e.target.id !== "score") handlePop(e); });
        window.addEventListener('touchend', handleRelease);
    </script>
</body>
</html>
